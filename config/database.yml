default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: webradar_development

test:
  <<: *default
  database: webradar_test
  url: <%= ENV.fetch("DATABASE_URL", "postgresql://webradar:password@localhost:5432/webradar_test") %>

production:
  <<: *default
  database: webradar_production
