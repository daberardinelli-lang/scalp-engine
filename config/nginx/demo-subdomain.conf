# config/nginx/demo-subdomain.conf
#
# Nginx wildcard subdomain per le demo HTML statiche.
# Copia questo file su: /etc/nginx/sites-available/demo.webradar.it
# Poi: ln -s /etc/nginx/sites-available/demo.webradar.it /etc/nginx/sites-enabled/
#
# Prerequisiti:
#   - Certificato SSL wildcard per *.demo.webradar.it (Let's Encrypt + certbot-dns)
#   - DNS: *.demo.webradar.it → A → IP VPS  (record wildcard)
#   - Demo HTML serviti da: /var/www/demos/{subdomain}/index.html
#     (symlink o bind-mount dal volume Docker demos_storage)
#
# Setup symlink:
#   ln -s /var/lib/docker/volumes/webradar_demos_storage/_data /var/www/demos
#
# Setup SSL wildcard con Certbot (usando DNS challenge):
#   apt install certbot python3-certbot-dns-cloudflare  # o il tuo DNS provider
#   certbot certonly --dns-cloudflare \
#     --dns-cloudflare-credentials /etc/cloudflare.ini \
#     -d "demo.webradar.it" -d "*.demo.webradar.it"

# Estrai il subdomain dal hostname (es: "ristorante-mario-po-a1b2c3.demo.webradar.it" → "ristorante-mario-po-a1b2c3")
map $host $demo_subdomain {
    ~^(?<sub>[a-z0-9\-]+)\.demo\.webradar\.it$  $sub;
    default                                       "";
}

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name *.demo.webradar.it;

    return 301 https://$host$request_uri;
}

# ─── HTTPS — serve demo statiche ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name *.demo.webradar.it;

    # SSL wildcard (generato con certbot, vedi istruzioni sopra)
    ssl_certificate     /etc/letsencrypt/live/demo.webradar.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.webradar.it/privkey.pem;

    # TLS moderno
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Root dei file statici demo
    root /var/www/demos;

    # Gzip per HTML statici
    gzip on;
    gzip_types text/html text/css text/javascript application/javascript image/svg+xml;

    # Header sicurezza (le demo sono noindex per design)
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "no-referrer" always;

    # Nessuna cache lato client (demo temporanee, cambiano)
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    location / {
        # Subdomain vuoto → 404
        if ($demo_subdomain = "") {
            return 404;
        }

        # Serve /var/www/demos/{subdomain}/index.html
        try_files /$demo_subdomain/index.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/html;
        internal;
    }

    # Log separati per le demo
    access_log /var/log/nginx/demo-webradar-access.log;
    error_log  /var/log/nginx/demo-webradar-error.log;
}
